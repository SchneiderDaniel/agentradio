# AI SEO Audit Scoring Rubric
# Each dimension has a max score and individual checks with point allocations.
# Adjust weights here — scripts read this file at runtime.

tiers:
  ai_ready:
    min_score: 80
    label: "AI-Ready"
    description: "Site is well-positioned for AI search. Focus on optimization and maintenance."
  partially_ready:
    min_score: 60
    label: "Partially Ready"
    description: "Foundations exist but targeted fixes needed for AI visibility."
  significant_gaps:
    min_score: 40
    label: "Significant Gaps"
    description: "Major structural improvements required before AI engines will cite this site."
  not_ready:
    min_score: 0
    label: "Not AI-Ready"
    description: "Foundational work required across all dimensions."

dimensions:
  content_structure:
    max_points: 25
    weight_reason: "Content structure is the #1 lever — answer-first paragraphs significantly increase AI citations (directionally supported by GEO research, no single verified multiplier)"
    checks:
      answer_first:
        points: 8
        description: "Pages have a direct answer in the first 40-60 words (GEO research confirms answer-first format significantly increases AI citation probability)"
        scoring: "8 = 80%+ pages, 5 = 50-79%, 3 = 25-49%, 0 = <25%"
      fact_density:
        points: 5
        description: "Statistics appear regularly in content (data-dense passages get cited more frequently by AI)"
        scoring: "5 = most pages have stats, 3 = some pages, 0 = none"
      in_text_citations:
        points: 4
        description: "Content cites external sources inline (passages with source attribution have significantly higher AI citation rates)"
        scoring: "4 = regular citations, 2 = occasional, 0 = none"
      expert_quotes:
        points: 3
        description: "Named expert quotes appear in content (improves AI trust and citation likelihood)"
        scoring: "3 = present, 1 = rare, 0 = none"
      content_freshness:
        points: 3
        description: "Content updated within last 12 months (85% of AI citations from last 2 years)"
        scoring: "3 = majority updated recently, 1 = some, 0 = stale"
      question_headings:
        points: 2
        description: "H2/H3 headings phrased as questions (matches how users query AI)"
        scoring: "2 = common pattern, 1 = some, 0 = none"

  schema_markup:
    max_points: 20
    weight_reason: "Schema markup = 2.5x higher AI citation rate — highest-leverage technical fix"
    checks:
      json_ld_present:
        points: 6
        description: "JSON-LD structured data exists on pages"
        scoring: "6 = 80%+ pages, 4 = 50-79%, 2 = <50%, 0 = none"
      schema_variety:
        points: 6
        description: "Multiple schema types (Organization, Article, Service, Product, SoftwareApplication). NEVER recommend HowTo (deprecated Sept 2023). FAQ restricted to gov/healthcare only (Aug 2023)."
        scoring: "6 = 4+ types, 4 = 2-3 types, 2 = 1 type, 0 = none"
        deprecated_types:
          - "HowTo"  # Deprecated September 2023
          - "SpecialAnnouncement"  # Deprecated July 2025
          - "CourseInfo"
          - "EstimatedSalary"
          - "LearningVideo"
          - "ClaimReview"
          - "VehicleListing"
          - "QAPage"  # Deprecated from rich results January 2026
          - "PracticeProblems"  # Documentation removed January 6, 2026
          - "Dataset"  # Now only serves Dataset Search, not general web search (January 2026)
        restricted_types:
          FAQPage: "ONLY for government and healthcare authority sites (restricted Aug 2023). Still has GEO/LLM citation benefit but no Google rich result for commercial sites."
      faq_for_geo:
        points: 4
        description: "FAQ content with Q&A format for AI citation (GEO benefit). Note: FAQPage schema no longer generates Google rich results for commercial sites (Aug 2023), but Q&A structure still helps AI models extract answers."
        scoring: "4 = FAQ content present with clear Q&A format, 2 = some Q&A content, 0 = none"
      schema_accuracy:
        points: 4
        description: "Schema data matches visible page content (AI engines check for consistency). Must use JSON-LD format (Google's stated preference). Must include in server-rendered HTML (Dec 2025 JS SEO guidance)."
        scoring: "4 = matches, 2 = partial match, 0 = mismatch or absent"

  crawler_access:
    max_points: 15
    weight_reason: "If AI crawlers can't access your site, nothing else matters"
    checks:
      robots_txt_ai_bots:
        points: 6
        description: "robots.txt allows AI crawlers. OpenAI has 3: GPTBot (training), OAI-SearchBot (search indexing), ChatGPT-User (retrieval). Anthropic has 3: ClaudeBot (training), Claude-SearchBot (search indexing), Claude-User (retrieval). Perplexity has 2: PerplexityBot (indexing), Perplexity-User (retrieval). Also: Google-Extended, Bytespider. Blocking search/retrieval bots reduces visibility even if training bots are allowed. 73% of sites have technical barriers blocking AI crawlers (OtterlyAI 2026)."
        scoring: "6 = all allowed, 4 = most allowed, 2 = some blocked, 0 = all blocked"
      llms_txt:
        points: 1
        description: "llms.txt file exists at domain root. No measurable citation impact as of March 2026 (ALLMO.ai study). Only ~10% of domains have it. No major AI platform uses it as a ranking/retrieval signal. Safe to implement but don't expect visibility gains."
        scoring: "1 = present and well-structured, 0 = absent"
      sitemap_xml:
        points: 3
        description: "Valid sitemap.xml exists and is accessible"
        scoring: "3 = valid and comprehensive, 1 = exists but incomplete, 0 = missing"
      ssr_or_static:
        points: 5
        description: "Content is server-rendered or static (46% of ChatGPT bot uses plain HTML mode)"
        scoring: "5 = SSR/static, 3 = hydrated SPA, 0 = fully client-rendered"

  multiplatform_presence:
    max_points: 15
    weight_reason: "Sites on 4+ platforms are 2.8x more likely to appear in ChatGPT"
    checks:
      reddit_presence:
        points: 4
        description: "Brand mentioned/active on Reddit (24% of AI responses cite Reddit)"
        scoring: "4 = active with multiple mentions, 2 = some mentions, 0 = absent"
      youtube_presence:
        points: 4
        description: "Brand has YouTube channel or video mentions (29.5% of AI Overviews)"
        scoring: "4 = active channel, 2 = some videos, 0 = absent"
      linkedin_presence:
        points: 3
        description: "Active LinkedIn presence with content"
        scoring: "3 = regular posts, 1 = profile only, 0 = absent"
      third_party_mentions:
        points: 4
        description: "Brand mentioned in industry publications, guest posts, directories"
        scoring: "4 = multiple 3rd-party mentions, 2 = some, 0 = none found"

  entity_clarity:
    max_points: 10
    weight_reason: "AI systems are entity-first — they must understand WHO you are before citing you"
    checks:
      alignment:
        points: 3
        description: "Entity-message alignment — does the website clearly communicate what the business actually does? Compares business context (services, audience, revenue model, differentiators) against site content."
        scoring: "3 = alignment score 8+/10, 2 = 5-7/10, 1 = 3-4/10, 0 = <3/10. Falls back to about-page check if no business context provided."
      consistent_naming:
        points: 3
        description: "Brand name used consistently across site and external profiles"
        scoring: "3 = consistent, 1 = somewhat consistent, 0 = inconsistent"
      author_credentials:
        points: 2
        description: "Author bylines with relevant expertise (+40% citation boost)"
        scoring: "2 = present with credentials, 1 = bylines only, 0 = anonymous"
      linked_profiles:
        points: 2
        description: "Social profiles linked from site (helps AI entity resolution)"
        scoring: "2 = multiple linked, 1 = some, 0 = none"

  current_ai_visibility:
    max_points: 10
    weight_reason: "Baseline measurement — are you already showing up in AI answers?"
    checks:
      perplexity_mentions:
        points: 5
        description: "Brand appears in Perplexity responses for industry queries"
        scoring: "5 = frequently, 3 = sometimes, 1 = rarely, 0 = never"
      search_ai_overview:
        points: 5
        description: "Brand appears in Google AI Overview / search results for key queries"
        scoring: "5 = frequently, 3 = sometimes, 1 = rarely, 0 = never"

  eeat_signals:
    max_points: 10
    weight_reason: "Dec 2025 update: E-E-A-T now applies to ALL competitive queries, not just YMYL. Affiliate sites -71%, health -67%, ecommerce -52%."
    checks:
      experience_signals:
        points: 3
        description: "First-hand experience: case studies with specific details, original data, before/after results, process documentation. AI can fake expertise but NOT experience."
        scoring: "3 = strong experience signals (case studies, original data), 2 = some, 1 = weak, 0 = none"
      expertise_signals:
        points: 3
        description: "Author credentials, technical accuracy, claims supported by sources, bylines with name + credentials"
        scoring: "3 = strong credentials + accurate content, 2 = some signals, 1 = minimal, 0 = anonymous/no credentials"
      trust_signals:
        points: 4
        description: "Contact info, privacy policy, HTTPS, transparent about creator, customer reviews, no deceptive practices. Trustworthiness is the most important E-E-A-T factor."
        scoring: "4 = comprehensive trust signals, 3 = most present, 2 = some, 1 = minimal, 0 = none"

  geo_citability:
    max_points: 10
    weight_reason: "Passage-level citability directly determines whether AI models quote your content. Optimal passages (134-167 words) with data and attribution get 2.3x more citations."
    checks:
      passage_optimization:
        points: 4
        description: "Content sections are 134-167 words, self-contained, start with direct answer"
        scoring: "4 = most sections optimized, 3 = some, 2 = few, 0 = none"
      data_attribution:
        points: 3
        description: "Passages contain statistics with source attribution (+115% AI visibility)"
        scoring: "3 = regular attributed data, 2 = some stats but unattributed, 1 = minimal, 0 = none"
      section_structure:
        points: 3
        description: "Question headings, lists/tables, expert quotes within sections"
        scoring: "3 = well-structured sections, 2 = some structure, 1 = minimal, 0 = wall of text"

  technical_foundations:
    max_points: 5
    weight_reason: "Hygiene factors — must be in place but not the primary differentiator"
    checks:
      https:
        points: 2
        description: "Site uses HTTPS"
        scoring: "2 = yes, 0 = no"
      mobile_friendly:
        points: 1
        description: "Site is mobile-responsive"
        scoring: "1 = yes, 0 = no"
      page_speed:
        points: 1
        description: "Pages load in under 3 seconds"
        scoring: "1 = fast, 0 = slow"
      clean_urls:
        points: 1
        description: "URLs are clean and descriptive (not query-string heavy)"
        scoring: "1 = clean, 0 = messy"
